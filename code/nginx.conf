# ── HTTP-context directives ────────────────────────────────────────────────
# (this file is included inside http{} via conf.d, so these are valid here)

# Restore real client IP from upstream reverse proxy.
# All connections to :8080 arrive from the proxy, so trust everyone.
real_ip_header    X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from  0.0.0.0/0;

server_tokens off;

# Rate-limit zones (keyed by real client IP after real-ip processing)
limit_req_zone  $binary_remote_addr  zone=auth_zone:10m    rate=8r/m;
limit_req_zone  $binary_remote_addr  zone=upload_zone:10m  rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=general_zone:10m rate=120r/m;

# Connection-limit zone
limit_conn_zone $binary_remote_addr  zone=conn_zone:10m;

# ── Port 8080 — reverse-proxy-facing ──────────────────────────────────────
server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Slow-loris / connection-flood protection
    client_body_timeout   15s;
    client_header_timeout 15s;
    keepalive_timeout     30s;
    send_timeout          15s;

    # Global body-size cap; upload locations override below
    client_max_body_size  2m;

    # Max simultaneous connections per real client IP
    limit_conn conn_zone 40;
    limit_conn_status 429;

    # Default rate limit applied to every location that doesn't override it
    limit_req zone=general_zone burst=30 nodelay;
    limit_req_status 429;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Block dotfiles / hidden paths
    location ~ /\. {
        deny all;
        return 404;
    }

    # Silent-drop common scanner probes (no TCP response)
    location ~* ^/(wp-admin|wp-login|wp-includes|xmlrpc\.php|\.env|\.git|phpMyAdmin|phpmyadmin|admin\.php|config\.php|setup\.php|install\.php|shell\.php|cmd\.php|eval-stdin\.php|vendor/phpunit|actuator|\.aws|\.ssh) {
        return 444;
    }

    location / { try_files $uri $uri/ /index.html; }

    location ~* \.(html|js|css)$ {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    location = /dmh-ai.crt {
        alias /etc/nginx/ssl/cert.pem;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="dmh-ai.crt"';
    }

    # ── Auth: tightest limit — main defense against password scanning ──────
    location /auth {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /user {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /users {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /sessions {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /search {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /fetch-page {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 15;
    }
    location /registry {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /cloud-api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 50m;
        client_body_timeout 120s;  # slow mobile upload of large context/images
        send_timeout 120s;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
    location /local-api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 50m;
        client_body_timeout 120s;
        send_timeout 120s;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
    location = /log {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /assets {
        limit_req zone=upload_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 50m;
        client_body_timeout 120s;
    }
    location /api {
        proxy_pass http://127.0.0.1:11434;
        proxy_http_version 1.1;
        client_max_body_size 50m;
        client_body_timeout 120s;
        send_timeout 120s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host localhost;
        proxy_set_header Origin "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
}

