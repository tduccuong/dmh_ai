<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
    <title>DMH-AI</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-title" content="DMH-AI">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#281e38">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="/marked.min.js"></script>
    <script src="/mammoth.min.js"></script>
    <script src="/xlsx.min.js"></script>
    <script src="/heic2any.min.js"></script>
    <script type="module">
        import * as pdfjsLib from '/pdf.min.js';
        pdfjsLib.GlobalWorkerOptions.workerSrc = '/pdf.worker.min.js';
        window.pdfjsLib = pdfjsLib;
    </script>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">
            <img src="/logo.png" style="height:32px;width:32px;border-radius:6px;object-fit:contain;flex-shrink:0;">
            <h2 style="color:#e09040;letter-spacing:0.04em;white-space:nowrap;flex:1;">DMH-AI</h2>
            <button id="sidebar-close-btn" class="sidebar-close-btn">&#x2715;</button>
        </div>
        <button class="new-session-btn" id="new-session-btn">+ New Session</button>
        <div class="sessions-list" id="sessions-list"></div>
        <div class="endpoint-section">
            <button class="sidebar-settings-btn" id="sidebar-settings-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span id="sidebar-settings-label">Settings</span>
            </button>
        </div>
    </div>
    <div class="main">
        <div class="pw-warning-banner" id="pw-warning-banner">
            <span id="pw-warning-text"></span>
            <button id="pw-warning-btn"></button>
        </div>
        <div class="error-banner" id="error-banner">
            <span id="error-message">Cannot connect to Ollama</span>
            <button onclick="location.reload()">Retry</button>
        </div>
        <div class="header">
            <img id="header-logo" src="/logo.png" style="display:none;height:36px;width:36px;border-radius:4px;object-fit:contain;flex-shrink:0;align-self:center;">
            <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
            <div class="lang-wrap" id="lang-wrap">
                <button class="lang-flag" id="lang-flag"></button>
                <div class="lang-dropdown" id="lang-dropdown"></div>
            </div>
            <button class="new-chat-btn" id="header-new-chat-btn" title="New chat"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <select id="header-model-select" style="display:none"></select>
            <div class="model-dropdown-wrap" id="model-dropdown-wrap">
                <button class="model-dropdown-trigger" id="model-dropdown-trigger">
                    <span id="model-dropdown-label">Select model...</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="model-dropdown-menu" id="model-dropdown-menu"></div>
            </div>
            <div class="user-menu-wrap" id="user-menu-wrap">
                <button class="user-menu-btn" id="user-menu-btn" title="Account">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </button>
                <div class="user-dropdown" id="user-dropdown">
                    <div class="user-dropdown-identity" id="user-dropdown-identity"></div>
                    <div class="user-dropdown-sep"></div>
                    <button class="user-dropdown-item user-dropdown-item-danger" id="user-clear-btn">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                        Clear current chat thread
                    </button>
                    <div class="user-dropdown-sep" id="user-settings-sep" style="display:none"></div>
                    <button class="user-dropdown-item" id="user-settings-btn" style="display:none">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span id="user-settings-label">Settings</span>
                    </button>
                    <div class="user-dropdown-sep"></div>
                    <button class="user-dropdown-item" id="user-change-pw-btn">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Change password
                    </button>
                    <div class="user-dropdown-sep" id="user-manage-sep" style="display:none"></div>
                    <button class="user-dropdown-item" id="user-manage-btn" style="display:none">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        Manage users
                    </button>
                    <div class="user-dropdown-sep"></div>
                    <button class="user-dropdown-item" id="user-signout-btn">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Sign out
                    </button>
                </div>
            </div>
        </div>
        <div class="chat-container" id="chat-container"></div>
        <div class="status-bar" id="status-bar">
            <div class="spinner"></div>
            <span id="status-text"></span>
        </div>
        <div class="voice-bar" id="voice-bar"><span class="voice-dot"></span><span id="voice-bar-text"></span></div>
        <div class="attachments-bar" id="attachments-bar"></div>
        <div class="input-area">
            <div style="position:relative;flex-shrink:0;display:flex;align-items:stretch;">
                <button class="attach-btn" id="attach-btn" title="Attach file">+</button>
                <div class="attach-menu" id="attach-menu">
                    <button class="attach-menu-item" id="attach-camera">📷 Camera</button>
                    <button class="attach-menu-item" id="attach-video">🎥 Video</button>
                    <button class="attach-menu-item" id="attach-gallery">🖼 Gallery</button>
                    <button class="attach-menu-item" id="attach-file">📄 File</button>
                    <button class="attach-menu-item" id="attach-voice">🎤 Voice</button>
                </div>
            </div>
            <input type="file" id="file-input" style="display:none" multiple accept=".pdf,.docx,.xlsx,.txt,.csv,.json,.xml,.md,.html,.css,.js,.py,.java,.c,.cpp,.h,.sh,.bat,.yml,.yaml,.toml,.ini,.cfg,.log">
            <input type="file" id="camera-input" style="display:none" accept="image/*" capture="environment">
            <input type="file" id="video-input" style="display:none" accept="video/*" capture="environment">
            <input type="file" id="gallery-input" style="display:none" accept="image/*,.heic,.heif">
            <div class="message-input-wrap">
                <textarea class="message-input" id="message-input" placeholder="Type a message..." rows="1"></textarea>
                <button class="stop-gen-btn" id="stop-gen-btn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><span class="stop-label" id="stop-label"></span></button>
            </div>
            <button class="send-btn" id="send-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg><span class="send-label" id="send-label">Send</span></button>
        </div>
    </div>
<div class="login-screen hidden" id="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <img src="/logo.png">
            <h1>DMH-AI</h1>
        </div>
        <div class="login-user-wrap">
            <input class="login-field" id="login-email" type="text" placeholder="Username" autocomplete="username">
            <span class="login-domain-suffix">@dmhai.local</span>
        </div>
        <input class="login-field" id="login-password" type="password" placeholder="Password" autocomplete="current-password">
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" id="login-btn">Sign in</button>
    </div>
</div>
<div class="mgr-overlay" id="mgr-overlay">
    <div class="mgr-box">
        <div class="mgr-title">
            <span>Manage Users</span>
            <button class="mgr-close" id="mgr-close">✕</button>
        </div>
        <table class="mgr-table" id="mgr-table">
            <thead><tr><th>Email</th><th>Name</th><th>Role</th><th></th></tr></thead>
            <tbody id="mgr-tbody"></tbody>
        </table>
        <div class="mgr-add-title">Add user</div>
        <div class="mgr-row">
            <div style="display:flex;align-items:center;flex:1;min-width:120px;background:#141018;border:1px solid #382850;border-radius:6px;overflow:hidden;">
                <input class="mgr-input" id="mgr-email" type="text" placeholder="Username" style="flex:1;min-width:0;border:none;background:transparent;">
                <span style="padding:0 10px 0 2px;color:#786888;font-size:13px;white-space:nowrap;user-select:none;">@dmhai.local</span>
            </div>
            <input class="mgr-input" id="mgr-name" type="text" placeholder="Name (optional)">
        </div>
        <div class="mgr-row">
            <input class="mgr-input" id="mgr-pw" type="password" placeholder="Password">
            <select class="mgr-select" id="mgr-role"><option value="user">User</option><option value="admin">Admin</option></select>
            <button class="mgr-add-btn" id="mgr-add-btn">Add</button>
        </div>
        <div class="mgr-error" id="mgr-error"></div>
    </div>
</div>
<div class="modal-overlay" id="cpw-overlay">
    <div class="modal">
        <div class="modal-title">Change password</div>
        <div class="modal-message" style="margin-bottom:12px;">
            <input id="cpw-current" type="password" placeholder="Current password" class="modal-input" style="margin-bottom:8px;">
            <input id="cpw-new" type="password" placeholder="New password" class="modal-input" style="margin-bottom:8px;">
            <input id="cpw-confirm" type="password" placeholder="Confirm new password" class="modal-input" style="margin-bottom:0;">
        </div>
        <div id="cpw-error" style="display:none;background:#3a1020;border:1px solid #e94560;color:#ff7090;font-size:13px;padding:8px 12px;border-radius:6px;margin-bottom:12px;"></div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="cpw-cancel">Cancel</button>
            <button class="modal-btn modal-btn-ok" id="cpw-ok">Change</button>
        </div>
    </div>
</div>
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-message" id="modal-message"></div>
        <input class="modal-input" id="modal-input" type="text">
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-btn" id="modal-ok">OK</button>
        </div>
    </div>
</div>
<script src="/js/stopwords.js" defer></script>
<script src="/js/app.js" defer></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <div class="settings-overlay" id="settings-overlay">
        <div class="settings-modal">
            <div class="settings-hdr">
                <span class="settings-hdr-title" id="settings-modal-title">Settings</span>
                <button class="settings-close-btn" id="settings-close-btn">✕</button>
            </div>
            <div class="settings-body">
                <!-- Section 1: Ollama Accounts -->
                <div class="settings-section">
                    <div class="settings-section-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Ollama Accounts
                    </div>
                    <div class="settings-subsection">
                        <div id="cloud-accounts-list" class="settings-list"></div>
                        <div class="settings-add-row">
                            <input id="cloud-acct-name" class="settings-input" placeholder="Account name">
                            <input id="cloud-acct-key" class="settings-input" type="password" placeholder="API key" style="flex:2">
                            <button class="settings-add-btn" id="cloud-acct-add-btn">+ Add</button>
                        </div>
                        <div id="cloud-acct-error" style="display:none;color:#e05060;font-size:12px;margin-top:6px;"></div>
                    </div>
                </div>
                <!-- Section 2: Ollama Cloud Models -->
                <div class="settings-section" id="cloud-models-section">
                    <div class="settings-section-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                        Ollama Cloud Models
                    </div>
                    <div class="settings-subsection">
                        <div id="cloud-models-list" class="settings-list"></div>
                        <div class="settings-search-wrap">
                            <input id="cloud-model-search" class="settings-input" placeholder="Search or type model name...">
                            <button class="settings-add-btn" id="cloud-model-add-btn">+ Add</button>
                            <div class="settings-suggestions" id="cloud-model-suggestions"></div>
                        </div>
                    </div>
                </div>
                <!-- Section 3: Ollama Local Models -->
                <div class="settings-section">
                    <div class="settings-section-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        Ollama Local Models
                    </div>
                    <div class="settings-subsection">
                        <div class="settings-add-row">
                            <input id="settings-ollama-url" class="settings-input" placeholder="http://localhost:11434" style="flex:3">
                            <button class="settings-add-btn" id="settings-ollama-url-save">Save</button>
                        </div>
                    </div>
                </div>
                <!-- Section 4: Chat -->
                <div class="settings-section">
                    <div class="settings-section-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span id="settings-chat-section-title">Chat</span>
                    </div>
                    <div class="settings-subsection">
                        <div class="settings-add-row" style="align-items:center;gap:8px;">
                            <label id="settings-compact-turns-label" style="white-space:nowrap;font-size:13px;color:var(--text-secondary)">Compact after messages</label>
                            <input id="settings-compact-turns" class="settings-input" type="number" min="10" max="500" style="width:70px;flex:none;">
                            <button class="settings-add-btn" id="settings-compact-turns-save">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button id="scroll-bottom-btn" style="display:none;position:fixed;bottom:120px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(58,42,80,0.75);border:1px solid #8060c0;color:#c0a0e0;cursor:pointer;z-index:9999;align-items:center;justify-content:center;font-size:18px;line-height:1;">&#8595;</button>
    <div id="img-lightbox" class="img-lightbox" style="display:none">
        <img id="img-lightbox-img" class="img-lightbox-img" draggable="false" />
        <button id="img-lightbox-close" class="img-lightbox-close">&#x2715;</button>
    </div>
</body>
</html>
