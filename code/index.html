<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
    <title>DMH-AI</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-title" content="DMH-AI">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#281e38">
    <link rel="stylesheet" href="/css/app.css">
    <script src="/marked.min.js"></script>
    <script src="/mammoth.min.js"></script>
    <script src="/xlsx.min.js"></script>
    <script src="/heic2any.min.js"></script>
    <script type="module">
        import * as pdfjsLib from '/pdf.min.js';
        pdfjsLib.GlobalWorkerOptions.workerSrc = '/pdf.worker.min.js';
        window.pdfjsLib = pdfjsLib;
    </script>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">
            <img src="/logo.png" style="height:32px;width:32px;border-radius:6px;object-fit:contain;flex-shrink:0;">
            <h2 style="color:#e09040;letter-spacing:0.04em;white-space:nowrap;">DMH-AI</h2>
        </div>
        <button class="new-session-btn" id="new-session-btn">+ New Session</button>
        <div class="sessions-list" id="sessions-list"></div>
        <div class="endpoint-section">
            <span class="endpoint-label" id="endpoint-label">Ollama Endpoint</span>
            <input class="endpoint-input" id="endpoint-input" type="text" value="" placeholder="http://localhost:11434">
            <button class="endpoint-update-btn" id="endpoint-update-btn">Update</button>
        </div>
    </div>
    <div class="main">
        <div class="pw-warning-banner" id="pw-warning-banner">
            <span id="pw-warning-text"></span>
            <button id="pw-warning-btn"></button>
        </div>
        <div class="error-banner" id="error-banner">
            <span id="error-message">Cannot connect to Ollama</span>
            <button onclick="location.reload()">Retry</button>
        </div>
        <div class="header" style="display:flex;gap:6px;align-items:stretch;">
            <img id="header-logo" src="/logo.png" style="display:none;height:36px;width:36px;border-radius:4px;object-fit:contain;flex-shrink:0;align-self:center;">
            <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
            <div class="lang-wrap" id="lang-wrap">
                <button class="lang-flag" id="lang-flag"></button>
                <div class="lang-dropdown" id="lang-dropdown"></div>
            </div>
            <button class="new-chat-btn" id="header-new-chat-btn" title="New chat"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <select class="model-select" id="header-model-select" style="flex:1;"></select>
            <div class="user-menu-wrap" id="user-menu-wrap">
                <button class="user-menu-btn" id="user-menu-btn" title="Account">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </button>
                <div class="user-dropdown" id="user-dropdown">
                    <div class="user-dropdown-identity" id="user-dropdown-identity"></div>
                    <div class="user-dropdown-sep"></div>
                    <button class="user-dropdown-item user-dropdown-item-danger" id="user-clear-btn">Clear current chat thread</button>
                    <div class="user-dropdown-sep"></div>
                    <button class="user-dropdown-item" id="user-change-pw-btn">Change password</button>
                    <div class="user-dropdown-sep" id="user-manage-sep" style="display:none"></div>
                    <button class="user-dropdown-item" id="user-manage-btn" style="display:none">Manage users</button>
                    <div class="user-dropdown-sep"></div>
                    <button class="user-dropdown-item" id="user-signout-btn">Sign out...</button>
                </div>
            </div>
        </div>
        <div class="chat-container" id="chat-container"></div>
        <div class="status-bar" id="status-bar">
            <div class="spinner"></div>
            <span id="status-text"></span>
            <button class="stop-gen-btn" id="stop-gen-btn" style="display:none"></button>
        </div>
        <div class="voice-bar" id="voice-bar"><span class="voice-dot"></span><span id="voice-bar-text"></span></div>
        <div class="attachments-bar" id="attachments-bar"></div>
        <div class="input-area">
            <div style="position:relative;flex-shrink:0;display:flex;align-items:stretch;">
                <button class="attach-btn" id="attach-btn" title="Attach file">+</button>
                <div class="attach-menu" id="attach-menu">
                    <button class="attach-menu-item" id="attach-camera">📷 Camera</button>
                    <button class="attach-menu-item" id="attach-video">🎥 Video</button>
                    <button class="attach-menu-item" id="attach-gallery">🖼 Gallery</button>
                    <button class="attach-menu-item" id="attach-file">📄 File</button>
                    <button class="attach-menu-item" id="attach-voice">🎤 Voice</button>
                </div>
            </div>
            <input type="file" id="file-input" style="display:none" multiple accept=".pdf,.docx,.xlsx,.txt,.csv,.json,.xml,.md,.html,.css,.js,.py,.java,.c,.cpp,.h,.sh,.bat,.yml,.yaml,.toml,.ini,.cfg,.log">
            <input type="file" id="camera-input" style="display:none" accept="image/*" capture="environment">
            <input type="file" id="video-input" style="display:none" accept="video/*" capture="environment">
            <input type="file" id="gallery-input" style="display:none" accept="image/*,.heic,.heif">
            <textarea class="message-input" id="message-input" placeholder="Type a message..." rows="1"></textarea>
            <button class="send-btn" id="send-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg><span class="send-label" id="send-label">Send</span></button>
        </div>
    </div>
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <img src="/logo.png">
            <h1>DMH-AI</h1>
        </div>
        <div class="login-user-wrap">
            <input class="login-field" id="login-email" type="text" placeholder="Username" autocomplete="username">
            <span class="login-domain-suffix">@dmhai.local</span>
        </div>
        <input class="login-field" id="login-password" type="password" placeholder="Password" autocomplete="current-password">
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" id="login-btn">Sign in</button>
    </div>
</div>
<div class="mgr-overlay" id="mgr-overlay">
    <div class="mgr-box">
        <div class="mgr-title">
            <span>Manage Users</span>
            <button class="mgr-close" id="mgr-close">✕</button>
        </div>
        <table class="mgr-table" id="mgr-table">
            <thead><tr><th>Email</th><th>Name</th><th>Role</th><th></th></tr></thead>
            <tbody id="mgr-tbody"></tbody>
        </table>
        <div class="mgr-add-title">Add user</div>
        <div class="mgr-row">
            <div style="display:flex;align-items:center;flex:1;min-width:120px;background:#141018;border:1px solid #382850;border-radius:6px;overflow:hidden;">
                <input class="mgr-input" id="mgr-email" type="text" placeholder="Username" style="flex:1;min-width:0;border:none;background:transparent;">
                <span style="padding:0 10px 0 2px;color:#786888;font-size:13px;white-space:nowrap;user-select:none;">@dmhai.local</span>
            </div>
            <input class="mgr-input" id="mgr-name" type="text" placeholder="Name (optional)">
        </div>
        <div class="mgr-row">
            <input class="mgr-input" id="mgr-pw" type="password" placeholder="Password">
            <select class="mgr-select" id="mgr-role"><option value="user">User</option><option value="admin">Admin</option></select>
            <button class="mgr-add-btn" id="mgr-add-btn">Add</button>
        </div>
        <div class="mgr-error" id="mgr-error"></div>
    </div>
</div>
<div class="modal-overlay" id="cpw-overlay">
    <div class="modal">
        <div class="modal-title">Change password</div>
        <div class="modal-message" style="margin-bottom:12px;">
            <input id="cpw-current" type="password" placeholder="Current password" class="modal-input" style="margin-bottom:8px;">
            <input id="cpw-new" type="password" placeholder="New password" class="modal-input" style="margin-bottom:8px;">
            <input id="cpw-confirm" type="password" placeholder="Confirm new password" class="modal-input" style="margin-bottom:0;">
        </div>
        <div id="cpw-error" style="display:none;background:#3a1020;border:1px solid #e94560;color:#ff7090;font-size:13px;padding:8px 12px;border-radius:6px;margin-bottom:12px;"></div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="cpw-cancel">Cancel</button>
            <button class="modal-btn modal-btn-ok" id="cpw-ok">Change</button>
        </div>
    </div>
</div>
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-message" id="modal-message"></div>
        <input class="modal-input" id="modal-input" type="text">
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-btn" id="modal-ok">OK</button>
        </div>
    </div>
</div>
<script src="/js/app.js" defer></script>
</body>
</html>
