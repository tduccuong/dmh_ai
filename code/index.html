<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMH-AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a2e'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='10' fill='%23e8a230'>DMH</text></svg>">
    <script src="/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1c1208; color: #eee; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: #281a08; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #3d2808; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 20px; background: #3d2808; border-bottom: 1px solid #1c1208; }
        .model-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #1c1208; background: #1c1208; color: #eee; font-size: 14px; }
        .sessions-list { flex: 1; overflow-y: auto; margin-top: 20px; }
        .session-item { padding: 8px 10px; margin-bottom: 2px; border-radius: 6px; cursor: pointer; background: transparent; transition: background 0.15s; display: flex; align-items: center; gap: 6px; border-left: 3px solid transparent; }
        .session-item:hover { background: rgba(255,255,255,0.05); }
        .session-item.active { background: rgba(181,98,30,0.18); border-left-color: #b5621e; }
        .session-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: #b0956a; }
        .session-item:hover .session-name { color: #ddd; }
        .session-item.active .session-name { color: #fff; font-weight: 500; }
        .session-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .session-item:hover .session-actions, .session-item.active .session-actions { opacity: 1; }

        .session-btn-edit { color: #93c5fd; }
        .session-btn-edit:hover { background: rgba(147,197,253,0.2); }
        .session-btn-delete { color: #fca5a5; }
        .session-btn-delete:hover { background: rgba(252,165,165,0.2); }
        .new-session-btn { padding: 12px; background: #b5621e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; max-width: 80%; }
        .message.user { margin-left: auto; background: #3d2808; padding: 12px 16px; border-radius: 12px 12px 0 12px; }
        .message.assistant { margin-right: auto; background: #281a08; padding: 12px 16px; border-radius: 12px 12px 12px 0; }
        .input-area { padding: 20px; background: #3d2808; display: flex; gap: 10px; }
        .message-input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #1c1208; background: #1c1208; color: #eee; font-size: 14px; font-family: inherit; resize: none; }
        .send-btn { padding: 12px 24px; background: #b5621e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-bar { padding: 6px 20px; background: #3d2808; color: #d4956a; font-size: 13px; display: none; align-items: center; gap: 8px; }
        .status-bar.visible { display: flex; }
        .spinner { width: 14px; height: 14px; border: 2px solid #d4956a; border-top-color: #b5621e; border-radius: 50%; flex-shrink: 0;
            animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-banner { background: #c0392b; color: white; padding: 15px 20px; text-align: center; display: none; }
        .error-banner button { background: white; color: #c0392b; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-left: 15px; font-weight: 600; }

        .endpoint-input { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #3d2808; background: #1c1208; color: #eee; font-size: 12px; }

        .attachment-chip { display: flex; align-items: center; gap: 5px; background: #1c1208; border: 1px solid #3d2808; border-radius: 5px; padding: 4px 8px; font-size: 12px; color: #e8c090; max-width: 200px; }
        .attachment-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .attachment-chip button { background: none; border: none; color: #d4956a; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; flex-shrink: 0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.visible { display: flex; }
        .modal { background: #281a08; border: 1px solid #5a3a10; border-radius: 10px; padding: 28px 24px 20px; width: 360px; max-width: 90vw; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
        .modal-title { font-size: 15px; font-weight: 600; color: #eee; margin-bottom: 10px; }

        .modal-input { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #5a3a10; background: #1c1208; color: #eee; font-size: 14px; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .modal-input:focus { border-color: #b5621e; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .modal-btn-cancel { background: #3d2808; color: #ccc; }
        .modal-btn-cancel:hover { background: #4e3210; }
        .modal-btn-ok { background: #b5621e; color: white; }
        .modal-btn-ok:hover { background: #8a4a18; }
        .modal-btn-danger { background: #e94560; color: white; }
        .modal-btn-danger:hover { background: #c0392b; }
        .message.assistant p { margin-bottom: 8px; }
        .message.assistant p:last-child, .message.assistant ul:last-child, .message.assistant ol:last-child { margin-bottom: 0; }
        .message.assistant h1, .message.assistant h2, .message.assistant h3,
        .message.assistant h4, .message.assistant h5, .message.assistant h6 { color: #d4956a; margin: 14px 0 6px; font-weight: 600; }
        .message.assistant h1 { font-size: 1.3em; } .message.assistant h2 { font-size: 1.15em; } .message.assistant h3 { font-size: 1em; }
        .message.assistant ul, .message.assistant ol { padding-left: 20px; margin-bottom: 8px; }
        .message.assistant li { margin-bottom: 3px; }
        .message.assistant pre { background: #1c1208; border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; border: 1px solid #3d2808; }
        .message.assistant pre code { background: none; padding: 0; color: #e8c090; font-size: 13px; }
        .message.assistant :not(pre) > code { background: #1c1208; padding: 2px 6px; border-radius: 3px; color: #e8c090; font-size: 13px; font-family: 'Courier New', monospace; }
        .message.assistant blockquote { border-left: 3px solid #b5621e; margin: 8px 0; padding: 4px 0 4px 12px; color: #d4956a; }
        .message.assistant hr { border: none; border-top: 1px solid #3d2808; margin: 12px 0; }
        .message.assistant table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
        .message.assistant th, .message.assistant td { border: 1px solid #3d2808; padding: 6px 10px; text-align: left; }
        .message.assistant th { background: #3d2808; color: #d4956a; }
        .message.assistant a { color: #d4956a; }
        .message.assistant strong { color: #e8c090; }

</head>
<body>
    <div class="error-banner" id="error-banner">
        <span id="error-message">Cannot connect to Ollama</span>
        <button onclick="location.reload()">Retry</button>
    </div>
    <div class="sidebar">
        <h2 style="color: #e8a230; margin-bottom: 15px; letter-spacing: 0.04em;">DMH-AI</h2>
        <button class="new-session-btn" id="new-session-btn">+ New Session</button>
        <div class="sessions-list" id="sessions-list"></div>
        <div class="endpoint-section">
            <span class="endpoint-label">Ollama Endpoint</span>
            <input class="endpoint-input" id="endpoint-input" type="text" value="http://localhost:11434">
            <button class="endpoint-update-btn" id="endpoint-update-btn">Update</button>
        </div>
    </div>
    <div class="main">
        <div class="header" style="display:flex;gap:10px;align-items:center;">
            <select class="model-select" id="header-model-select"></select>
            <button class="clear-btn" id="clear-session-btn">Clear</button>
        </div>
        <div class="chat-container" id="chat-container"></div>
        <div class="status-bar" id="status-bar">
            <div class="spinner"></div>
            <span id="status-text"></span>
        </div>
        <div class="attachments-bar" id="attachments-bar"></div>
        <div class="input-area">
            <button class="attach-btn" id="attach-btn" title="Attach file">+</button>
            <input type="file" id="file-input" style="display:none" multiple>

            <button class="send-btn" id="send-btn">Send</button>
        </div>
    </div>
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-message" id="modal-message"></div>
        <input class="modal-input" id="modal-input" type="text">
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-btn" id="modal-ok">OK</button>
        </div>
    </div>
</div>
<script>
marked.use({ gfm: true, breaks: true });

function syslog(msg) {
    fetch('/log', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({msg}) }).catch(()=>{});
}

const AppConfig = {
    get searxngUrl() { return localStorage.getItem('searxng-url') || 'http://localhost:8888'; },
    saveSearxng: function(url) {
        if (url) localStorage.setItem('searxng-url', url);
        else localStorage.removeItem('searxng-url');
    }
};

const Modal = {
    _resolve: null,

    _open: function(title, message, inputDefault, okLabel, danger) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-message').textContent = message;
        const input = document.getElementById('modal-input');
        const okBtn = document.getElementById('modal-ok');
        okBtn.textContent = okLabel || 'OK';
        okBtn.className = 'modal-btn ' + (danger ? 'modal-btn-danger' : 'modal-btn-ok');
        if (inputDefault !== null) {
            input.style.display = 'block';
            input.value = inputDefault;
            setTimeout(function() { input.focus(); input.select(); }, 50);
        } else {
            input.style.display = 'none';
        }
        document.getElementById('modal-overlay').classList.add('visible');
        const self = this;
        return new Promise(function(resolve) { self._resolve = resolve; });
    },

    _close: function(value) {
        document.getElementById('modal-overlay').classList.remove('visible');
        if (this._resolve) { this._resolve(value); this._resolve = null; }
    },

    confirm: function(title, message, okLabel) {
        return this._open(title, message, null, okLabel || 'Confirm', true);
    },

    prompt: function(title, defaultValue) {
        return this._open(title, '', defaultValue || '', 'OK', false);
    },

    init: function() {
        const self = this;
        document.getElementById('modal-ok').addEventListener('click', function() {
            const input = document.getElementById('modal-input');
            self._close(input.style.display !== 'none' ? input.value : true);
        });
        document.getElementById('modal-cancel').addEventListener('click', function() { self._close(null); });
        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === e.currentTarget) self._close(null);
        });
        document.getElementById('modal-input').addEventListener('keydown', function(e) {
            const input = document.getElementById('modal-input');
            if (e.key === 'Enter') { self._close(input.value); }
            if (e.key === 'Escape') { self._close(null); }
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('modal-overlay').classList.contains('visible')) {
                self._close(null);
            }
        });
    }
};

const SessionStore = {
    BASE: '/sessions',
    getSessions: async function() {
        const res = await fetch(this.BASE);
        return res.json();
    },
    createSession: async function(name, model) {
        const session = {
            id: Date.now().toString(),
            name: name || 'New Session',
            model: model || '',
            messages: [],
            context: { summary: null, summaryUpToIndex: -1 },
            createdAt: Date.now()
        };
        await fetch(this.BASE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(session)
        });
        return session;
    },
    getSession: async function(id) {
        const res = await fetch(this.BASE + '/' + id);
        if (!res.ok) return null;
        return res.json();
    },
    updateSession: async function(session) {
        await fetch(this.BASE + '/' + session.id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(session)
        });
    },
    deleteSession: async function(id) {
        await fetch(this.BASE + '/' + id, { method: 'DELETE' });
    },
    getCurrentSessionId: async function() {
        const res = await fetch(this.BASE + '/current');
        const data = await res.json();
        return data.id;
    },
    setCurrentSessionId: async function(id) {
        await fetch(this.BASE + '/current', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
    }
};

const OllamaAPI = {
    endpoint: 'http://localhost:11434',
    contextWindowCache: {},
    get BASE_URL() { return this.endpoint + '/api'; },
    setEndpoint: function(url) {
        this.endpoint = url.replace(/\/+$/, '');
        this.contextWindowCache = {};
    },
    formatSize: function(bytes) {
        if (!bytes) return '';
        if (bytes < 1e9) return ' (' + (bytes / 1e6).toFixed(0) + ' MB)';
        return ' (' + (bytes / 1e9).toFixed(1) + ' GB)';
    },
    fetchModels: async function() {
        try {
            const response = await fetch(this.BASE_URL + '/tags');
            if (!response.ok) throw new Error('Failed to fetch models');
            const data = await response.json();
            const models = data.models || [];
            models.sort(function(a, b) { return (a.size || 0) - (b.size || 0); });
            return models;
        } catch (e) {
            console.error('Failed to fetch models:', e);
            throw e;
        }
    },
    fetchContextWindow: async function(model) {
        if (this.contextWindowCache[model]) return this.contextWindowCache[model];
        try {
            const res = await fetch(this.BASE_URL + '/show', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: model })
            });
            if (!res.ok) throw new Error('show failed');
            const data = await res.json();
            const info = data.model_info || {};
            const entry = Object.entries(info).find(function(kv) { return kv[0].endsWith('context_length'); });
            const ctxLen = (entry ? entry[1] : null) || 4096;
            this.contextWindowCache[model] = ctxLen;
            return ctxLen;
        } catch (e) {
            return 4096;
        }
    },
    summarize: async function(model, messages) {
        try {
            const res = await fetch(this.BASE_URL + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: model, messages: messages, stream: false })
            });
            if (!res.ok) throw new Error('summarize failed');
            const data = await res.json();
            return (data.message && data.message.content) ? data.message.content : null;
        } catch (e) {
            console.error('Summarization failed:', e);
            return null;
        }
    },
    streamChat: function(model, messages, onChunk, onComplete, onError) {
        const controller = new AbortController();
        fetch(this.BASE_URL + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: model, messages: messages, stream: true }),
            signal: controller.signal
        })
        .then(async function(response) {
            if (!response.ok) throw new Error('Chat request failed');
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const result = await reader.read();
                if (result.done) break;
                buffer += decoder.decode(result.value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i].trim();
                    if (line) {
                        try {
                            var json = JSON.parse(line);
                            if (json.message && json.message.content) {
                                onChunk(json.message.content);
                            }
                        } catch (e) {}
                    }
                }
            }
            if (onComplete) onComplete();
        })
        .catch(function(err) {
            if (err.name !== 'AbortError' && onError) onError(err);
        });
        return controller;
    }
};

// Converts internal message format to what Ollama expects:
// images stored as {base64, mime} objects → plain base64 strings
function prepareForAPI(messages) {
    return messages.map(function(msg) {
        if (!msg.images || msg.images.length === 0) return msg;
        return Object.assign({}, msg, { images: msg.images.map(function(img) { return img.base64; }) });
    });
}

const ContextManager = {
    COMPACT_THRESHOLD: 0.80,
    KEEP_RECENT: 6,

    estimateTokens: function(messages) {
        return messages.reduce(function(sum, m) {
            return sum + Math.ceil((m.content || '').length / 4);
        }, 0);
    },

    // Builds the messages array actually sent to the model.
    // Uses summary + recent messages when a compaction has occurred.
    buildContextMessages: function(session) {
        var ctx = session.context;
        if (!ctx || !ctx.summary) return session.messages.slice();
        var recent = session.messages.slice(ctx.summaryUpToIndex + 1);
        return [
            { role: 'user', content: '[Summary of our conversation so far]\n' + ctx.summary },
            { role: 'assistant', content: 'Understood, I have the full context of our conversation.' }
        ].concat(recent);
    },

    shouldCompact: function(session, contextWindow, pendingContent) {
        var contextMsgs = this.buildContextMessages(session);
        var pendingTokens = Math.ceil((pendingContent || '').length / 4);
        var total = this.estimateTokens(contextMsgs) + pendingTokens;
        return (total / contextWindow) > this.COMPACT_THRESHOLD;
    },

    compact: async function(session) {
        var ctx = session.context || { summary: null, summaryUpToIndex: -1 };
        var keepFrom = Math.max(0, session.messages.length - this.KEEP_RECENT);
        var toSummarize = session.messages.slice(0, keepFrom);
        if (toSummarize.length === 0) return;

        var summarizeInput = [];
        if (ctx.summary) {
            summarizeInput.push({ role: 'user', content: '[Previous summary]\n' + ctx.summary });
            summarizeInput.push({ role: 'assistant', content: 'Understood.' });
        }
        // Strip images from summarization input — use text content only
        summarizeInput = summarizeInput.concat(toSummarize.map(function(msg) {
            return { role: msg.role, content: msg.content };
        }));
        summarizeInput.push({ role: 'user', content: 'Please write a concise but complete summary of this conversation, preserving all key facts, topics, decisions, and any code or technical details discussed.' });

        var summary = await OllamaAPI.summarize(session.model, summarizeInput);
        if (!summary) return; // summarization failed; leave context unchanged

        session.context = { summary: summary, summaryUpToIndex: keepFrom - 1 };
        await SessionStore.updateSession(session);
    }
};

const UIManager = {
    currentSession: null,
    isStreaming: false,
    attachedFiles: [],
    
    init: function() {
        const self = this;
        Modal.init();
        document.getElementById('new-session-btn').addEventListener('click', function() { self.createNewSession(); });
        document.getElementById('endpoint-update-btn').addEventListener('click', function() { self.updateEndpoint(); });
        document.getElementById('endpoint-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') self.updateEndpoint(); });
        document.getElementById('send-btn').addEventListener('click', function() { self.sendMessage(); });
        document.getElementById('message-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!self.isStreaming) self.sendMessage(); }
        });
        document.getElementById('message-input').addEventListener('paste', function(e) {
            var items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    e.preventDefault();
                    var blob = items[i].getAsFile();
                    if (blob) {
                        var ext = items[i].type.split('/')[1] || 'png';
                        var file = new File([blob], 'paste-' + Date.now() + '.' + ext, { type: items[i].type });
                        self.handleFileSelect([file]);
                    }
                }
            }
        });
        document.getElementById('header-model-select').addEventListener('change', function(e) { self.switchModel(e.target.value); });
        document.getElementById('clear-session-btn').addEventListener('click', function() { self.clearSession(); });
        document.getElementById('attach-btn').addEventListener('click', function() {
            document.getElementById('file-input').click();
        });
        document.getElementById('file-input').addEventListener('change', function(e) {
            if (e.target.files.length) self.handleFileSelect(e.target.files);
            e.target.value = '';
        });
        this.initializeApp();
    },
    
    initializeApp: async function() {
        try {
            const models = await OllamaAPI.fetchModels();
            this.populateModelSelects(models);
            const sessions = await SessionStore.getSessions();
            if (sessions.length === 0) {
                const model = document.getElementById('header-model-select').value;
                const defaultSession = await SessionStore.createSession('Default Session', model);
                await SessionStore.setCurrentSessionId(defaultSession.id);
                this.currentSession = defaultSession;
            } else {
                const currentId = await SessionStore.getCurrentSessionId();
                this.currentSession = currentId ? sessions.find(function(s) { return s.id === currentId; }) : sessions[0];
                if (!this.currentSession) this.currentSession = sessions[0];
                await SessionStore.setCurrentSessionId(this.currentSession.id);
            }
            if (this.currentSession && this.currentSession.model) {
                document.getElementById('header-model-select').value = this.currentSession.model;
            }
            await this.renderSessions();
            this.renderChat();
        } catch (e) {
            this.showError('Cannot connect to Ollama. Please ensure Ollama is running on localhost:11434');
        }
    },
    
    populateModelSelects: function(models) {
        const select = document.getElementById('header-model-select');
        select.innerHTML = '';
        models.forEach(function(model) {
            const option = document.createElement('option');
            option.value = model.name;
            option.textContent = model.name + OllamaAPI.formatSize(model.size);
            select.appendChild(option);
        });
    },
    
    renderSessions: async function() {
        const self = this;
        const container = document.getElementById('sessions-list');
        container.innerHTML = '';
        const sessions = await SessionStore.getSessions();
        sessions.forEach(function(s) {
            const item = document.createElement('div');
            item.className = 'session-item' + (s.id === self.currentSession.id ? ' active' : '');

            const nameSpan = document.createElement('span');
            nameSpan.className = 'session-name';
            nameSpan.textContent = s.name;
            nameSpan.title = s.name;
            item.addEventListener('click', function() { self.switchSession(s.id); });

            const actions = document.createElement('div');
            actions.className = 'session-actions';

            const editBtn = document.createElement('button');
            editBtn.className = 'session-btn session-btn-edit';
            editBtn.title = 'Rename';
            editBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
            editBtn.addEventListener('click', async function(e) {
                e.stopPropagation();
                const newName = await Modal.prompt('Rename session', s.name);
                if (!newName || !newName.trim() || newName === s.name) return;
                s.name = newName;
                await SessionStore.updateSession(s);
                if (self.currentSession.id === s.id) self.currentSession.name = newName;
                await self.renderSessions();
            });

            const delBtn = document.createElement('button');
            delBtn.className = 'session-btn session-btn-delete';
            delBtn.title = 'Delete';
            delBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
            delBtn.addEventListener('click', async function(e) {
                e.stopPropagation();
                const ok = await Modal.confirm('Delete session', 'Delete "' + s.name + '"? This cannot be undone.', 'Delete');
                if (!ok) return;
                await SessionStore.deleteSession(s.id);
                if (self.currentSession.id === s.id) {
                    const remaining = await SessionStore.getSessions();
                    self.currentSession = remaining.length > 0
                        ? remaining[0]
                        : await SessionStore.createSession('New Session', '');
                    await SessionStore.setCurrentSessionId(self.currentSession.id);
                    self.renderChat();
                }
                await self.renderSessions();
            });

            actions.appendChild(editBtn);
            actions.appendChild(delBtn);
            item.appendChild(nameSpan);
            item.appendChild(actions);
            container.appendChild(item);
        });
    },
    
    renderChat: function() {
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        if (!this.currentSession) return;
        this.currentSession.messages.forEach(function(msg) {
            const div = document.createElement('div');
            div.className = 'message ' + msg.role;
            if (msg.role === 'assistant') {
                div.innerHTML = marked.parse(msg.content || '');
            } else {
                var fileNames = [];
                var displayText = (msg.content || '').replace(/\n\n\[File: ([^\]]+)\]\n```[\s\S]*?```/g, function(_, name) {
                    fileNames.push(name);
                    return '';
                });
                div.textContent = displayText;
                if (fileNames.length > 0) {
                    var filesDiv = document.createElement('div');
                    filesDiv.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;';
                    fileNames.forEach(function(name) {
                        var chip = document.createElement('span');
                        chip.style.cssText = 'background:#1c1208;border:1px solid #3d2808;border-radius:4px;padding:2px 8px;font-size:12px;color:#e8c090;';
                        chip.textContent = '📄 ' + name;
                        filesDiv.appendChild(chip);
                    });
                    div.appendChild(filesDiv);
                }
            }
            if (msg.images && msg.images.length > 0) {
                msg.images.forEach(function(img) {
                    const el = document.createElement('img');
                    el.src = 'data:' + img.mime + ';base64,' + img.base64;
                    el.style.cssText = 'max-width:300px;margin-top:8px;border-radius:6px;display:block;';
                    div.appendChild(el);
                });
            }
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    },

    handleFileSelect: async function(files) {
        const self = this;
        const sessionId = this.currentSession ? this.currentSession.id : 'default';
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            var formData = new FormData();
            formData.append('file', file);
            formData.append('sessionId', sessionId);
            try {
                var res = await fetch('/assets', { method: 'POST', body: formData });
                var data = await res.json();
                self.attachedFiles.push(data);
                self.renderAttachments();
            } catch (e) {
                console.error('Upload failed:', e);
            }
        }
    },

    removeAttachment: function(id) {
        this.attachedFiles = this.attachedFiles.filter(function(f) { return f.id !== id; });
        this.renderAttachments();
    },

    renderAttachments: function() {
        const bar = document.getElementById('attachments-bar');
        const self = this;
        if (this.attachedFiles.length === 0) {
            bar.className = 'attachments-bar';
            bar.innerHTML = '';
            return;
        }
        bar.className = 'attachments-bar visible';
        bar.innerHTML = '';
        this.attachedFiles.forEach(function(f) {
            var chip = document.createElement('div');
            chip.className = 'attachment-chip';
            var icon = f.type === 'image' ? '🖼 ' : '📄 ';
            chip.innerHTML = '<span>' + icon + f.name + '</span>';
            var btn = document.createElement('button');
            btn.textContent = '×';
            btn.onclick = function() { self.removeAttachment(f.id); };
            chip.appendChild(btn);
            bar.appendChild(chip);
        });
    },

    updateEndpoint: async function() {
        const url = document.getElementById('endpoint-input').value.trim();
        if (!url) return;
        OllamaAPI.setEndpoint(url);
        const btn = document.getElementById('endpoint-update-btn');
        btn.disabled = true;
        btn.textContent = 'Updating...';
        try {
            const models = await OllamaAPI.fetchModels();
            const currentModel = this.currentSession ? this.currentSession.model : null;
            this.populateModelSelects(models);
            const names = models.map(function(m) { return m.name; });
            if (currentModel && names.indexOf(currentModel) !== -1) {
                document.getElementById('header-model-select').value = currentModel;
            } else if (models.length > 0) {
                this.switchModel(models[0].name);
            }
        } catch (e) {
            this.showError('Cannot connect to ' + url);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Update';
        }
    },

    clearSession: async function() {
        if (!this.currentSession) return;
        const ok = await Modal.confirm('Clear session', 'Clear all history in "' + this.currentSession.name + '"? This cannot be undone.', 'Clear');
        if (!ok) return;
        this.currentSession.messages = [];
        this.currentSession.context = { summary: null, summaryUpToIndex: -1 };
        await SessionStore.updateSession(this.currentSession);
        this.attachedFiles = [];
        this.renderAttachments();
        this.renderChat();
    },

    createNewSession: async function() {
        const name = await Modal.prompt('New session name', 'New Session');
        if (!name || !name.trim()) return;
        const currentModel = document.getElementById('header-model-select').value;
        const session = await SessionStore.createSession(name, currentModel);
        await SessionStore.setCurrentSessionId(session.id);
        this.currentSession = session;
        await this.renderSessions();
        this.renderChat();
    },

    switchSession: async function(id) {
        this.currentSession = await SessionStore.getSession(id);
        await SessionStore.setCurrentSessionId(id);
        document.getElementById('header-model-select').value = this.currentSession.model;
        await this.renderSessions();
        this.renderChat();
    },

    switchModel: function(modelName) {
        if (this.currentSession) {
            this.currentSession.model = modelName;
            SessionStore.updateSession(this.currentSession); // fire-and-forget
        }
        document.getElementById('header-model-select').value = modelName;
    },
    
    setStatus: function(text) {
        document.getElementById('status-text').textContent = text;
        document.getElementById('status-bar').classList.toggle('visible', !!text);
    },

    getSearchKeywords: async function(userMessage) {
        try {
            const res = await fetch(OllamaAPI.BASE_URL + '/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: this.currentSession.model,
                    stream: false,
                    options: { temperature: 0 },
                    prompt:
                        'You are a search query generator. Rules:\n' +
                        '1. Do NOT answer the question\n' +
                        '2. Do NOT use names, facts, or answers from your training data — they may be outdated\n' +
                        '3. Generate neutral descriptive keywords a human would search to find the CURRENT answer online\n' +
                        '4. Always include the year ' + new Date().getFullYear() + '\n\n' +
                        'Does this question need current/live information (current leaders, prices, news, events, etc.)?\n' +
                        'Question: "' + userMessage + '"\n\n' +
                        'If YES: reply with ONLY 4-6 search keywords. No names from your training. No explanation.\n' +
                        'If NO: reply with only the word NO.'
                })
            });
            const data = await res.json();
            const reply = (data.response || '').trim();
            if (!reply || /^no\b/i.test(reply)) return null;
            return reply.replace(/['"*\n]/g, ' ').trim();
        } catch (e) { return null; }
    },

    searchWeb: async function(keywords) {
        try {
            const url = '/search?q=' + encodeURIComponent(keywords) + '&engine=' + encodeURIComponent(AppConfig.searxngUrl);
            const res = await fetch(url);
            if (!res.ok) return null;
            const data = await res.json();
            const results = (data.results || []).filter(function(r) { return r.title || r.content; });
            if (!results.length) return null;
            return results.map(function(r, i) {
                return (i + 1) + '. ' + r.title + ' (' + r.url + ')\n   ' + (r.content || '').slice(0, 800);
            }).join('\n\n');
        } catch (e) { return null; }
    },

    synthesizeResults: async function(question, keywords, results, today) {
        try {
            const res = await fetch(OllamaAPI.BASE_URL + '/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: this.currentSession.model,
                    stream: false,
                    options: { temperature: 0 },
                    prompt: 'Today is ' + today + '. Extract the key facts from these web search results to answer the question. Be concise and factual. Use only what the results say.\n\nQuestion: ' + question + '\n\nSearch results:\n' + results + '\n\nKey facts from results:'
                })
            });
            const data = await res.json();
            return (data.response || '').trim() || results;
        } catch (e) { return results; }
    },

    sendMessage: async function() {
        const self = this;
        if (this.isStreaming) return;
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        if (!content) return;

        // Backwards-compat: ensure context field exists on sessions created before this feature
        if (!this.currentSession.context) {
            this.currentSession.context = { summary: null, summaryUpToIndex: -1 };
        }

        // Check compaction before adding new message (includes pending content in estimate)
        const contextWindow = await OllamaAPI.fetchContextWindow(this.currentSession.model);
        if (ContextManager.shouldCompact(this.currentSession, contextWindow, content)) {
            await ContextManager.compact(this.currentSession);
        }

        var fullContent = content;
        var images = [];
        this.attachedFiles.forEach(function(f) {
            if (f.type === 'text') {
                fullContent += '\n\n[File: ' + f.name + ']\n```\n' + f.content + '\n```';
            } else if (f.type === 'image') {
                images.push({ base64: f.base64, mime: f.mime });
            }
        });
        var userMsg = { role: 'user', content: fullContent };
        if (images.length > 0) userMsg.images = images;
        this.currentSession.messages.push(userMsg);
        this.attachedFiles = [];
        this.renderAttachments();
        await SessionStore.updateSession(this.currentSession);
        this.renderChat();
        input.value = '';

        const container = document.getElementById('chat-container');
        const assistantDiv = document.createElement('div');
        assistantDiv.className = 'message assistant';
        container.appendChild(assistantDiv);
        container.scrollTop = container.scrollHeight;

        this.isStreaming = true;
        document.getElementById('send-btn').disabled = true;

        let apiMessages = prepareForAPI(ContextManager.buildContextMessages(this.currentSession));
        const searchTriggerPattern = /\b(search|find)\b.{0,40}\b(web|internet|online)\b|\b(web|internet|online)\b.{0,40}\b(search|find)\b/i;
        const needsWebSearch = searchTriggerPattern.test(content);
        const cleanedContent = needsWebSearch ? content.replace(searchTriggerPattern, '').replace(/^[\s,;.]+|[\s,;.]+$/g, '').trim() : content;
        syslog('[SEND] user="' + content.slice(0, 120) + '" needsWebSearch=' + needsWebSearch + ' cleanedQuery="' + cleanedContent + '"');
        if (AppConfig.searxngUrl && needsWebSearch) {
            this.setStatus('Generating search keywords...');
            const keywords = await this.getSearchKeywords(cleanedContent);
            syslog('[KEYWORDS] result="' + keywords + '"');
            if (keywords) {
                this.setStatus('Searching the web...');
                const results = await this.searchWeb(keywords);
                syslog('[SEARCH] got results: ' + (results ? results.slice(0, 200) : 'null'));
                if (results) {
                    this.setStatus('Synthesizing results...');
                    const today = new Date().toDateString();
                    const synthesis = await this.synthesizeResults(cleanedContent, keywords, results, today);
                    syslog('[SYNTHESIS] ' + synthesis);
                    const last = apiMessages[apiMessages.length - 1];
                    apiMessages = apiMessages.slice(0, -1).concat([{
                        role: 'user',
                        content: 'User request: ' + cleanedContent + '\n\nWeb search results (retrieved ' + today + '):\n' + synthesis + '\n\nUsing the user request and the web search results above, compile a complete and accurate answer.'
                    }]);
                    syslog('[INJECT] synthesized results injected into context');
                } else {
                    syslog('[SEARCH] fallback: search returned no results');
                    assistantDiv.innerHTML = '<em style="color:#c0724a;">⚠ Web search unavailable — answering from model training data, which may be outdated.</em><br><br>';
                }
            }
        }
        this.setStatus('Waiting for ' + this.currentSession.model + ' to answer...');

        let assistantContent = '';
        const searchWarning = assistantDiv.innerHTML;
        const sessionAtSend = this.currentSession;
        OllamaAPI.streamChat(
            sessionAtSend.model,
            apiMessages,
            function(chunk) {
                assistantContent += chunk;
                if (self.currentSession === sessionAtSend) {
                    assistantDiv.innerHTML = searchWarning + marked.parse(assistantContent);
                    container.scrollTop = container.scrollHeight;
                }
            },
            function() {
                sessionAtSend.messages.push({ role: 'assistant', content: assistantContent });
                SessionStore.updateSession(sessionAtSend);
                self.isStreaming = false;
                document.getElementById('send-btn').disabled = false;
                self.setStatus('');
            },
            function(err) {
                console.error('Stream error:', err);
                if (self.currentSession === sessionAtSend) {
                    assistantDiv.textContent += '\n[Error: ' + err.message + ']';
                }
                self.isStreaming = false;
                document.getElementById('send-btn').disabled = false;
                self.setStatus('');
            }
        );
    },
    
    showError: function(message) {
        document.getElementById('error-message').textContent = message;
        document.getElementById('error-banner').style.display = 'block';
    },
    
    hideError: function() {
        document.getElementById('error-banner').style.display = 'none';
    }
};

document.addEventListener('DOMContentLoaded', function() {
    UIManager.init();
});
</script>
